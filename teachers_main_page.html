<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بلاغات سابقة</title>
  <link rel="stylesheet" href="adminStyles.css">
</head>

<body class="admin-body" style="display:flex; flex-direction:column; min-height:100vh;">

<!-- ===== Header ===== -->
<header class="admin-header">
  <div class="admin-left">
    <img src="img/logo.png" class="admin-logo" alt="Logo">
    <div class="admin-title">
      <h1>بلاغات المدرب</h1>
      <span>محطة الدعم</span>
    </div>
  </div>

  <a href="index.html" class="logout">تسجيل الخروج</a>
</header>

<!-- ===== Main ===== -->
<main class="admin-main" style="flex:1; padding-top:50px;">

  <!-- زر إضافة بلاغ بالنص -->
<div class="add-report-box" style="margin-right:0px;" >
  <button class="stat-card"  onclick="window.location.href='add_report.html'">
    <h2>➕ إضافة بلاغ جديد</h2>
  </button>
</div>

  <!-- كروت البلاغات -->
  <section class="reports-section" style="max-width:900px; margin:auto; margin-top:100px;"">
    <h2 class="section-title" style="text-align:center;">بلاغاتك السابقة</h2>

    <div class="reports-box">
      <div class="reports-scroll" id="reportCards"></div>
    </div>
  </section>

</main>

<script>
const container = document.getElementById("reportCards");

// قراءة البلاغات
let reports = JSON.parse(localStorage.getItem("teacherReport")) || [];

// لو ما فيه بلاغات
if (reports.length === 0) {
  container.innerHTML = `
    <div class="report-card" style="
      background:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    ">
      لا توجد بلاغات حتى الآن
    </div>`;
}

// عرض البلاغات ككروت
reports.forEach(r => {

  let statusText =
    r.status === "processing" ? "قيد المراجعة" :
    r.status === "running" ? "تحت التنفيذ" :
    r.status === "done" ? "تم الحل" :
    r.status || "غير محدد";

  let card = `
    <div class="report-card" style="
      background:#fff;
      padding:18px;
      border-radius:12px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      margin-bottom:15px;
    ">
      <h3>#${r.id} - ${r.type}</h3>

      <p><b>الوصف:</b> ${r.desc}</p>
      <p><b>الموقع:</b> ${r.type === "نقل" ? "-" : (r.location || "-")}</p>
      <p><b>الحالة:</b> ${statusText}</p>

      <button class="btn-process" onclick="openReport(${r.id})">عرض البلاغ</button>
    </div>
  `;

  container.innerHTML += card;
});

function openReport(id) {
  const selected = reports.find(x => x.id === id);

  if (!selected) {
    alert("حدث خطأ: البلاغ غير موجود");
    return;
  }

  localStorage.setItem("selectedTeacherReport", JSON.stringify(selected));
  window.location.href = "teach_report.html";
}
</script>

<footer class="main-footer">
  <div class="footer-content">
      <p>&copy; 2026 حقوق محفوظة | محطة الدعم</p>
      <ul class="footer-links">
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="#">عن الموقع</a></li>
          <li><a href="mailto:example@example.com">اتصل بنا</a></li>
      </ul>
  </div>
</footer>

</body>
</html>
