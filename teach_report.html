<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل البلاغ</title>
  <link rel="stylesheet" href="style_report.css">
</head>

<body>

<div class="header">تفاصيل البلاغ</div>

<div class="container" style="margin-top:200px;">
  <div class="card">
    <div id="details"></div>

    <button class="light" onclick="deleteReport()" style="background:#ffdddd; color:#b30000;">حذف البلاغ</button>
    <button class="light" onclick="window.location.href='teachers_main_page.html'">رجوع</button>
  </div>
</div>

<script>
  // قراءة البلاغ المختار الصحيح
  let report = JSON.parse(localStorage.getItem("selectedTeacherReport"));

  const details = document.getElementById("details");

  if (!report) {
    details.innerHTML = "<p>❌ لم يتم اختيار بلاغ.</p>";
  } else {
    details.innerHTML = `
      <p><b>رقم البلاغ:</b> #${report.id}</p>
      <p><b>النوع:</b> ${report.type}</p>
      <p><b>الموقع:</b> ${report.type === "نقل" ? "-" : (report.location || "-")}</p>
      <p><b>من:</b> ${report.from || "-"}</p>
      <p><b>إلى:</b> ${report.to || "-"}</p>
      <p><b>الوصف:</b> ${report.desc || "-"}</p>
      <p><b>الحالة:</b> ${report.status || "-"}</p>
    `;
  }

  // دالة حذف البلاغ
  function deleteReport() {
    if (!confirm("هل أنتِ متأكدة من حذف البلاغ؟")) return;

    let reports = JSON.parse(localStorage.getItem("teacherReport")) || [];

    // حذف البلاغ من القائمة
    reports = reports.filter(r => r.id !== report.id);

    // حفظ القائمة الجديدة
    localStorage.setItem("teacherReport", JSON.stringify(reports));

    alert("تم حذف البلاغ بنجاح");

    // الرجوع للصفحة السابقة
    window.location.href = "teachers_main_page.html";
  }
</script>

<footer class="main-footer">
  <div class="footer-content">
      <p>&copy; 2026 حقوق محفوظة | محطة الدعم</p>
      <ul class="footer-links">
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="#">عن الموقع</a></li>
          <li><a href="mailto:example@example.com">اتصل بنا</a></li>
      </ul>
  </div>
</footer>

</body>
</html>
